<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>Nova — Présentation</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@200;300;400;500;600&family=DM+Mono:wght@300;400&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #050505; overflow: hidden; }
  body { font-family: "Sora", system-ui, sans-serif; color: #f5f5f0; }
  #root { position: absolute; inset: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="animations.jsx"></script>
<script type="text/babel" src="scenes.jsx"></script>

<script type="text/babel">
  const { Stage, useTimeline } = window;

  // Syncs the voiceover audio with the Stage timeline
  function AudioSync({ src }) {
    const audioRef = React.useRef(null);
    const { time, playing } = useTimeline();
    const prevPlayingRef = React.useRef(false);

    // On first load, create audio
    React.useEffect(() => {
      const audio = new Audio(src);
      audio.preload = 'auto';
      audioRef.current = audio;
      return () => { audio.pause(); audioRef.current = null; };
    }, [src]);

    // Sync play/pause
    React.useEffect(() => {
      const audio = audioRef.current;
      if (!audio) return;
      if (playing && !prevPlayingRef.current) {
        audio.play().catch(() => {});
      } else if (!playing && prevPlayingRef.current) {
        audio.pause();
      }
      prevPlayingRef.current = playing;
    }, [playing]);

    // Seek when user scrubs (diff > 0.4s means user dragged the scrubber)
    const lastSyncedTime = React.useRef(0);
    React.useEffect(() => {
      const audio = audioRef.current;
      if (!audio) return;
      const diff = Math.abs(audio.currentTime - time);
      if (diff > 0.4) {
        audio.currentTime = Math.max(0, time);
        lastSyncedTime.current = time;
      }
    }, [time]);

    return null;
  }

  function App() {
    return (
      <Stage
        width={1920}
        height={1080}
        duration={58.5}
        background="oklch(0.06 0 0)"
        persistKey="nova-video"
      >
        <AudioSync src="./voix-off.mp3" />
        <window.NovaVideo />
      </Stage>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
