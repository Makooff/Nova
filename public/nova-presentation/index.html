<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>Nova — Présentation</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@200;300;400;500;600&family=DM+Mono:wght@300;400&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #050505; overflow: hidden; }
  body { font-family: "Sora", system-ui, sans-serif; color: #f5f5f0; }
  #root { position: absolute; inset: 0; }
</style>
<script>
  /* Reset saved playhead so each opening starts fresh at t=0 */
  try { localStorage.removeItem('nova-video:t'); } catch {}
  /* Mute all audio when ?muted param is present (inline preview mode) */
  window.__NOVA_MUTED__ = new URLSearchParams(location.search).has('muted');
  if (window.__NOVA_MUTED__) {
    let n = 0;
    const _muteId = setInterval(() => {
      document.querySelectorAll('audio, video').forEach(function(el) {
        el.muted = true;
        el.volume = 0;
      });
      if (++n > 120) clearInterval(_muteId);
    }, 100);
  }
</script>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="animations.jsx"></script>
<script type="text/babel" src="scenes.jsx"></script>

<script type="text/babel">
  const { Stage } = window;

  function App() {
    const loop = new URLSearchParams(location.search).has('muted');
    return (
      <Stage
        width={1920}
        height={1080}
        duration={58.5}
        background="oklch(0.06 0 0)"
        autoplay={true}
        loop={loop}
        hideControls={true}
        persistKey="nova-video"
      >
        <window.NovaVideo />
      </Stage>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
